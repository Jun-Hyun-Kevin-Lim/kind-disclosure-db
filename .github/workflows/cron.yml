name: KIND Disclosure Bot

on:
  schedule:
    # UTC 시간 기준: 22:30(KST 07:30), 00:30(KST 09:30) ... 10:30(KST 19:30)
    - cron: "30 22,0,2,4,6,8,10 * * *"
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Main Script
        run: python main.py
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json retry_queue.json logs.csv version_log.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update state files [skip ci]"
          git push
