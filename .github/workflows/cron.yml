name: KIND Disclosure Bot

on:
  schedule:
    # UTC 기준: 22:30(KST 07:30), 00:30(KST 09:30) ... 10:30(KST 19:30)
    - cron: "30 22,0,2,4,6,8,10 * * *"
  workflow_dispatch: {}

concurrency:
  group: kind-disclosure-bot
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Main Script
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
          DEBUG_HTML: "1"
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 파일이 없어서 실패하는 케이스 방지
          git add seen.json retry_queue.json logs.csv version_log.csv || true

          # 변경 없으면 커밋 스킵
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update state files [skip ci]"
          git push
