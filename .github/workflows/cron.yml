name: KIND Scraper Daily

# 언제 실행할지 설정
on:
  schedule:
    # 한국 시간(KST) 기준으로 평일(월~금) 오후 6시에 실행 (UTC 기준 09:00)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # GitHub 웹에서 수동으로 버튼을 눌러 실행할 수 있게 함

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 패키지 설치
      run: |
        pip install -r requirements.txt

    - name: 크롤링 및 구글시트 업데이트 실행
      env:
        # 사진에 있는 Repository secrets를 환경 변수로 불러옴
        GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
      run: |
        python scraper.py
