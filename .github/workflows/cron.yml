name: KIND Disclosure Enterprise Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: kind-disclosure-bot
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System Dependencies (Java for Tabula)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Main Script
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
          BOT_VERSION: "kind-bot-v15-enterprise"
        run: python kind_everything.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json retry_queue.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update state files [skip ci]"
          git push
