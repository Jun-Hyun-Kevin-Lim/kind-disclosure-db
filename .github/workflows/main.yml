name: KIND popup dump (team lead method)

on:
  workflow_dispatch:
  schedule:
    - cron: "10 0 * * *"   # 매일 09:10 KST (UTC 00:10)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore seen.json cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-json-v1
          restore-keys: |
            seen-json-v1

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run (popup scrape -> excel dump)
        env:
          HEADLESS: "true"
          KEYWORDS: "유상증자,전환사채,교환사채"
          LIMIT: "20"
        run: |
          python main.py

      - name: Upload artifacts (excels + debug)
        uses: actions/upload-artifact@v4
        with:
          name: kind-output
          path: |
            out/*.xlsx
            out/debug/*

      - name: Save seen.json cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-json-v1
